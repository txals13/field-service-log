<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;background:#0f1117;color:#e8eaf0;font-size:14px;line-height:1.5}
:root{
  --bg0:#0f1117;--bg1:#1a1d27;--bg2:#21253a;
  --br:#2e3350;--br2:#3d4268;
  --tx1:#e8eaf0;--tx2:#9aa0c0;--tx3:#5a6080;
  --amber:#f5a623;--amberDim:#a06a10;--amberBg:rgba(245,166,35,.12);
  --green:#22c55e;--greenBg:rgba(34,197,94,.1);
  --red:#ef4444;--redBg:rgba(239,68,68,.1);
  --blue:#3b82f6;--blueBg:rgba(59,130,246,.12);
}
#app{display:flex;flex-direction:column;height:100vh;height:100dvh}
.topbar{display:flex;align-items:center;gap:8px;padding:10px 12px;border-bottom:1px solid var(--br);background:var(--bg1);flex-shrink:0}
.logo{font-family:monospace;font-size:13px;font-weight:700;color:var(--amber);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.top-badge{font-size:11px;font-weight:700;padding:2px 8px;border-radius:3px;white-space:nowrap;max-width:150px;overflow:hidden;text-overflow:ellipsis}
.sync-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:4px}
.body{display:flex;flex:1;overflow:hidden;position:relative}
.sidebar{width:230px;border-right:1px solid var(--br);background:var(--bg1);display:flex;flex-direction:column;overflow:hidden;transition:width .2s;flex-shrink:0}
.sidebar.collapsed{width:0;min-width:0}
@media(max-width:640px){
  .sidebar{position:absolute;top:0;left:0;height:100%;width:85%;max-width:280px;z-index:20;transform:translateX(-100%);transition:transform .25s}
  .sidebar.open{transform:translateX(0)}
}
.side-hdr{padding:8px 10px;border-bottom:1px solid var(--br);display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.side-label{font-size:11px;color:var(--tx3);text-transform:uppercase;letter-spacing:.8px}
.session-list{flex:1;overflow-y:auto;padding:6px;-webkit-overflow-scrolling:touch}
.sitem{border:1px solid transparent;border-radius:6px;padding:8px 10px;margin-bottom:4px;cursor:pointer;position:relative;transition:border-color .15s,background .15s}
.sitem:hover,.sitem:active{background:var(--bg2);border-color:var(--br)}
.sitem.active{background:var(--bg2);border-color:var(--amber)}
.sitem-badge{font-size:10px;font-weight:700;padding:1px 6px;border-radius:3px;display:inline-block;margin-bottom:4px;font-family:monospace}
.sitem-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:1px}
.sitem-sub{font-size:11px;color:var(--tx3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sitem-del{position:absolute;top:6px;right:6px;background:none;border:none;color:var(--tx3);font-size:11px;padding:3px 6px;border-radius:3px;cursor:pointer}
.content{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;color:var(--tx2);padding:40px;text-align:center}
.login-screen{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:40px;text-align:center}
.session-hdr{padding:8px 12px;border-bottom:1px solid var(--br);background:var(--bg1);flex-shrink:0}
.shdr-top{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:4px}
.shdr-meta{font-size:12px;color:var(--tx2);display:flex;gap:10px;flex-wrap:wrap}
.filter-row{display:flex;align-items:center;gap:8px;padding:6px 12px;border-bottom:1px solid var(--br);flex-shrink:0}
.log-area{flex:1;overflow-y:auto;padding:10px 12px;-webkit-overflow-scrolling:touch}
.log-row{display:flex;gap:8px;padding:6px 8px;border-radius:6px;margin-bottom:3px;align-items:flex-start;border-left:2px solid var(--br2)}
.log-actions{display:flex;gap:2px;flex-shrink:0;opacity:0;transition:opacity .15s}
.log-row:hover .log-actions{opacity:1}
.log-act-btn{background:none;border:none;color:var(--tx3);font-size:13px;padding:3px 6px;border-radius:4px;cursor:pointer}
.log-act-btn:hover{background:var(--bg2);color:var(--tx1)}
@media(max-width:640px){.log-actions{opacity:1}}
.log-row.ok{border-left-color:var(--green);background:var(--greenBg)}
.log-row.warning{border-left-color:var(--amber);background:var(--amberBg)}
.log-row.error{border-left-color:var(--red);background:var(--redBg)}
.log-dot{font-size:10px;margin-top:4px;flex-shrink:0}
.log-meta{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:3px;align-items:center}
.log-ts{font-size:10px;color:var(--tx3);font-family:monospace;white-space:nowrap}
.log-sev{font-size:10px;font-weight:700;padding:1px 5px;border-radius:2px;font-family:monospace}
.log-tag{font-size:10px;padding:1px 5px;border-radius:2px;background:var(--blueBg);color:var(--blue);font-family:monospace}
.log-text{font-size:13px;color:var(--tx1);line-height:1.4;word-break:break-word}
.thumbs{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.thumb{width:64px;height:64px;border-radius:6px;overflow:hidden;border:1px solid var(--br);cursor:pointer;flex-shrink:0;position:relative}
.thumb-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:var(--bg2);font-size:22px}
.thumb-vid-badge{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.35);color:#fff;font-size:18px;pointer-events:none}
.thumb-status{position:absolute;bottom:2px;left:2px;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff}
.thumb-status.uploading{background:var(--blue);animation:spin 1s linear infinite}
.thumb-status.error{background:var(--red)}
.file-names-list{display:flex;flex-direction:column;gap:6px;margin-top:8px}
.file-name-row{display:flex;align-items:center;gap:8px;font-size:12px}
.file-name-row .fnr-icon{flex-shrink:0;color:var(--tx3)}
.file-name-row input{flex:1;font-size:12px;padding:5px 8px}
.file-name-row .fnr-status{font-size:10px;color:var(--tx3);flex-shrink:0;width:14px;text-align:center}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.media-filename{position:absolute;bottom:16px;left:0;right:0;text-align:center;color:#fff;font-size:12px;font-family:monospace;background:rgba(0,0,0,.5);padding:4px 10px;width:fit-content;margin:0 auto;border-radius:4px}
.thumb img{width:100%;height:100%;object-fit:cover}
.thumb-del{position:absolute;top:2px;right:2px;background:rgba(0,0,0,.7);border:none;color:#fff;border-radius:50%;width:18px;height:18px;font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0}
.input-bar{border-top:1px solid var(--br);padding:8px 12px;background:var(--bg1);flex-shrink:0;display:flex;flex-direction:column;gap:6px}
.input-row{display:flex;gap:6px;align-items:flex-end}
.controls{display:flex;flex-direction:column;gap:5px;flex-shrink:0}
textarea,input[type=text],select{background:var(--bg2);border:1px solid var(--br);border-radius:6px;color:var(--tx1);font-family:inherit;font-size:13px;padding:7px 10px;outline:none;width:100%;-webkit-appearance:none;appearance:none}
textarea:focus,input[type=text]:focus,select:focus{border-color:var(--amber)}
textarea{resize:none;line-height:1.4}
.sel-sm{width:108px;font-size:12px;padding:6px 8px;cursor:pointer}
.inp-sm{font-size:12px;padding:6px 8px;width:108px}
button{background:var(--bg2);border:1px solid var(--br);border-radius:6px;color:var(--tx1);font-size:13px;padding:7px 13px;cursor:pointer;font-family:inherit;transition:background .15s;white-space:nowrap;-webkit-appearance:none}
button:hover{background:var(--br2)}
button:active{opacity:.8}
button:disabled{opacity:.4;cursor:not-allowed}
.btn-p{background:var(--amberBg);border-color:var(--amberDim);color:var(--amber);font-weight:700}
.btn-sm{font-size:12px;padding:5px 10px}
.btn-g{background:transparent;border-color:transparent;color:var(--tx2);padding:6px 8px}
.btn-g:hover{background:var(--bg2)}
.btn-d{background:rgba(239,68,68,.12);border-color:rgba(239,68,68,.4);color:var(--red)}
.btn-google{background:#fff;border:1px solid #dadce0;color:#3c4043;font-weight:600;display:inline-flex;align-items:center;gap:8px;padding:10px 20px;font-size:14px;border-radius:6px;cursor:pointer;transition:background .15s}
.btn-google:hover{background:#f8f9fa}
.status-bar{padding:6px 12px;border-top:1px solid var(--br);background:var(--bg1);font-size:11px;color:var(--tx3);display:flex;align-items:center;gap:12px;flex-wrap:wrap;flex-shrink:0;font-family:monospace}
.closed-bar{padding:8px 12px;border-top:1px solid var(--br);background:rgba(239,68,68,.06);font-size:12px;color:var(--tx2);text-align:center;flex-shrink:0;display:flex;align-items:center;justify-content:center;gap:8px}
.exp-menu-wrap{position:relative;display:inline-block}
.exp-menu{display:none;position:absolute;right:0;top:100%;margin-top:4px;background:var(--bg1);border:1px solid var(--br2);border-radius:6px;min-width:130px;z-index:50;box-shadow:0 4px 12px rgba(0,0,0,.3);overflow:hidden}
.exp-menu button{display:block;width:100%;text-align:left;background:none;border:none;border-radius:0;padding:9px 14px;font-size:13px;color:var(--tx1);cursor:pointer;border-bottom:1px solid var(--br)}
.exp-menu button:last-child{border-bottom:none}
.exp-menu button:hover{background:var(--bg2)}
.sync-bar{padding:6px 12px;background:rgba(245,166,35,.08);border-bottom:1px solid rgba(245,166,35,.2);font-size:11px;color:var(--amber);display:flex;align-items:center;gap:6px;flex-shrink:0}
.modal-back{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:flex-end;justify-content:center;z-index:100}
@media(min-width:480px){.modal-back{align-items:center}}
.modal{background:var(--bg1);border:1px solid var(--br2);border-radius:10px 10px 0 0;padding:20px;width:100%;max-width:440px;max-height:92vh;overflow-y:auto}
@media(min-width:480px){.modal{border-radius:10px}}
.modal-title{font-size:15px;font-weight:700;margin-bottom:16px;color:var(--amber)}
.field{margin-bottom:11px}
.field label{display:block;font-size:11px;color:var(--tx2);text-transform:uppercase;letter-spacing:.7px;margin-bottom:4px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
.img-modal{position:fixed;inset:0;background:rgba(0,0,0,.9);display:flex;align-items:center;justify-content:center;z-index:200;cursor:pointer}
.img-modal img{max-width:95vw;max-height:90vh;object-fit:contain;border-radius:6px}
.img-close{position:fixed;top:14px;right:14px;z-index:201;background:rgba(255,255,255,.15);border:none;color:#fff;border-radius:50%;width:36px;height:36px;font-size:18px;cursor:pointer}
.install-bar{background:var(--amberBg);border-bottom:1px solid var(--amberDim);padding:7px 12px;display:flex;align-items:center;gap:8px;font-size:12px;flex-shrink:0}
.install-bar span{flex:1;color:var(--amber)}
.no-ent{font-family:monospace;font-size:12px;color:var(--tx3);padding:24px 0;text-align:center}
.overlay{position:absolute;inset:0;z-index:19;background:rgba(0,0,0,.5);display:none}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(245,166,35,.3);border-top-color:var(--amber);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--br2);border-radius:2px}
.setup-box{background:var(--bg1);border:1px solid var(--br2);border-radius:10px;padding:24px;max-width:460px;width:100%}
.setup-box h2{font-size:16px;font-weight:700;color:var(--amber);margin-bottom:12px}
.setup-box p{font-size:13px;color:var(--tx2);margin-bottom:10px;line-height:1.6}
.setup-box ol{font-size:13px;color:var(--tx2);padding-left:18px;margin-bottom:16px;line-height:1.8}
.setup-box a{color:var(--blue)}
.setup-box code{background:var(--bg2);padding:1px 6px;border-radius:3px;font-family:monospace;font-size:12px;color:var(--amber)}
</style>
</head>
<body>
<div id="app">
  <div id="ibar" class="install-bar" style="display:none">
    <span>&#128242; Instal&#183;la l'app per accedir offline</span>
    <button class="btn-p btn-sm" id="btnInst">Install</button>
    <button class="btn-g btn-sm" id="btnInstX">&#10005;</button>
  </div>
  <div class="topbar">
    <button class="btn-g" id="btnSide" style="font-size:18px;padding:4px 8px">&#9776;</button>
    <span class="logo">&#9881; Field Service Log</span>
    <span class="top-badge" id="topBadge" style="display:none"></span>
    <div style="display:flex;align-items:center;gap:6px;margin-left:auto;flex-shrink:0">
      <span id="syncStatus" style="font-size:11px;color:var(--tx3);font-family:monospace;white-space:nowrap"></span>
      <button class="btn-sm btn-g" id="btnImport" title="Import sessions from JSON file">&#8679; Import</button>
      <input type="file" id="importFileIn" accept=".json" style="display:none">
      <button class="btn-p btn-sm" id="btnNew" style="flex-shrink:0">+ New</button>
    </div>
  </div>
  <div id="syncBar" class="sync-bar" style="display:none">
    <span class="spinner"></span>
    <span id="syncMsg">Syncing with Google Drive...</span>
  </div>
  <div class="body">
    <div class="sidebar" id="sidebar">
      <div class="side-hdr">
        <span class="side-label" id="sideCount">Sessions</span>
        <button class="btn-g btn-sm" id="btnSideX" style="font-size:14px">&#10005;</button>
      </div>
      <div class="session-list" id="sList"></div>
    </div>
    <div class="overlay" id="overlay"></div>
    <div class="content" id="mainContent">
      <!-- filled by JS -->
    </div>
  </div>
  <div class="modal-back" id="mBack" style="display:none">
    <div class="modal">
      <div class="modal-title">&#9658; New Service Visit</div>
      <div class="field"><label>Client / Company *</label><input type="text" id="mCli" placeholder="Client name"></div>
      <div class="field"><label>Machine / Equipment *</label><input type="text" id="mMac" placeholder="Model or reference"></div>
      <div class="field"><label>Location</label><input type="text" id="mLoc" placeholder="Plant, line..."></div>
      <div class="field"><label>Technician</label><input type="text" id="mTec" placeholder="Technician name"></div>
      <div class="field"><label>Type</label>
        <select id="mTyp" style="width:100%;font-size:13px;padding:7px 10px">
          <option value="commissioning">Commissioning (COM)</option>
          <option value="maintenance">Maintenance (MNT)</option>
          <option value="retrofit">Upgrade / Retrofit (RET)</option>
        </select>
      </div>
      <div class="modal-actions">
        <button id="mCancel">Cancel</button>
        <button class="btn-p" id="mSave">&#10003; Create session</button>
      </div>
    </div>
  </div>
  <div class="modal-back" id="eBack" style="display:none">
    <div class="modal">
      <div class="modal-title">&#9998; Edit Entry</div>
      <div class="field"><label>Severity</label>
        <select id="eSev" style="width:100%;font-size:13px;padding:7px 10px">
          <option value="info">&#9675; Info</option>
          <option value="ok">&#9679; OK</option>
          <option value="warning">&#9650; Warning</option>
          <option value="error">&#9632; Issue</option>
        </select>
      </div>

// ── EXIF DATE EXTRACTION ───────────────────────────────────────────────────
function readExifDate(arrayBuffer){
  try{
    var view = new DataView(arrayBuffer);
    if(view.getUint16(0,false) !== 0xFFD8) return null;
    var offset = 2, length = view.byteLength;
    while(offset < length){
      if(view.getUint16(offset,false) === 0xFFE1){
        var exifStart = offset + 4;
        if(view.getUint32(exifStart,false) !== 0x45786966) return null;
        var tiffOffset = exifStart + 6;
        var little = view.getUint16(tiffOffset,false) === 0x4949;
        var firstIFD = view.getUint32(tiffOffset+4, little);
        var dateStr = findExifTag(view, tiffOffset, tiffOffset+firstIFD, little, 0x9003)
                   || findExifTag(view, tiffOffset, tiffOffset+firstIFD, little, 0x0132);
        if(dateStr) return parseExifDateString(dateStr);
        return null;
      } else if((view.getUint16(offset,false) & 0xFF00) !== 0xFF00){
        break;
      } else {
        offset += 2 + view.getUint16(offset+2,false);
      }
    }
  }catch(e){}
  return null;
}
function findExifTag(view, tiffOffset, ifdOffset, little, tagId){
  try{
    var entries = view.getUint16(ifdOffset, little);
    for(var i=0;i<entries;i++){
      var entryOffset = ifdOffset + 2 + (i*12);
      if(view.getUint16(entryOffset, little)===tagId){
        var count = view.getUint32(entryOffset+4, little);
        var valueOffset = tiffOffset + view.getUint32(entryOffset+8, little);
        var bytes=[];
        for(var j=0;j<count-1;j++) bytes.push(view.getUint8(valueOffset+j));
        return String.fromCharCode.apply(null, bytes);
      }
    }
  }catch(e){}
  return null;
}
function parseExifDateString(s){
  var m = /^(\d{4}):(\d{2}):(\d{2}) (\d{2}):(\d{2}):(\d{2})/.exec(s);
  if(!m) return null;
  var d = new Date(+m[1], +m[2]-1, +m[3], +m[4], +m[5], +m[6]);
  if(isNaN(d.getTime())) return null;
  return d.toISOString();
}

// ── MP4/MOV CREATION TIME EXTRACTION ───────────────────────────────────────
var MAC_EPOCH_OFFSET = 2082844800;
function findMp4Atom(view, start, end, name){
  var offset = start;
  while(offset < end - 8){
    var size = view.getUint32(offset, false);
    var type = String.fromCharCode(view.getUint8(offset+4),view.getUint8(offset+5),view.getUint8(offset+6),view.getUint8(offset+7));
    if(size===0||size===1) break;
    if(type===name) return {start:offset+8, end:offset+size};
    offset += size;
  }
  return null;
}
function readMp4CreationDate(arrayBuffer){
  try{
    var view = new DataView(arrayBuffer);
    var moov = findMp4Atom(view, 0, view.byteLength, 'moov');
    if(!moov) return null;
    var mvhd = findMp4Atom(view, moov.start, moov.end, 'mvhd');
    if(!mvhd) return null;
    var version = view.getUint8(mvhd.start);
    var secs = version===1
      ? view.getUint32(mvhd.start+4,false)*4294967296 + view.getUint32(mvhd.start+8,false)
      : view.getUint32(mvhd.start+4,false);
    if(!secs) return null;
    var unix = secs - MAC_EPOCH_OFFSET;
    if(unix<=0) return null;
    var d = new Date(unix*1000);
    if(isNaN(d.getTime())) return null;
    var y = d.getUTCFullYear();
    if(y<1990||y>2100) return null;
    return d.toISOString();
  }catch(e){}
  return null;
}
// ── VIDEO THUMBNAIL GENERATION ─────────────────────────────────────────────
// Captures a frame from a video file (via an offscreen <video>+<canvas>) and
// returns it as a JPEG data URL. Used for thumbnails in the app, and as the
// representative image in PDF/DOCX exports where playback is not possible.
function generateVideoThumbnail(file){
  return new Promise(function(resolve){
    try{
      var url = URL.createObjectURL(file);
      var videoEl = document.createElement('video');
      videoEl.preload = 'metadata';
      videoEl.muted = true;
      videoEl.playsInline = true;
      videoEl.src = url;
      var done = false;
      var finish = function(dataUrl){
        if(done) return;
        done = true;
        URL.revokeObjectURL(url);
        resolve(dataUrl);
      };
      videoEl.addEventListener('loadeddata', function(){
        try{
          // Seek slightly into the video to avoid an all-black first frame
          var seekTo = Math.min(0.5, (videoEl.duration||1)/4);
          videoEl.currentTime = seekTo;
        }catch(e){ captureFrame(); }
      });
      videoEl.addEventListener('seeked', captureFrame);
      videoEl.addEventListener('error', function(){ finish(null); });
      function captureFrame(){
        try{
          var canvas = document.createElement('canvas');
          var w = videoEl.videoWidth || 320, h = videoEl.videoHeight || 240;
          var maxDim = 480;
          var scale = Math.min(1, maxDim/Math.max(w,h));
          canvas.width = Math.round(w*scale);
          canvas.height = Math.round(h*scale);
          var ctx = canvas.getContext('2d');
          ctx.drawImage(videoEl, 0, 0, canvas.width, canvas.height);
          finish(canvas.toDataURL('image/jpeg', 0.7));
        }catch(e){ finish(null); }
      }
      // Safety timeout in case metadata/seek events never fire (some mobile
      // browsers are inconsistent with video element events for local files)
      setTimeout(function(){ finish(null); }, 4000);
    }catch(e){ resolve(null); }
  });
}

function getFileTimestamp(file){
  var inner = new Promise(function(resolve){
    var fb=function(){resolve(file.lastModified?new Date(file.lastModified).toISOString():null);};
    if(file.type==='image/jpeg'||file.type==='image/jpg'){
      var r=new FileReader();
      r.onload=function(ev){resolve(readExifDate(ev.target.result)||(file.lastModified?new Date(file.lastModified).toISOString():null));};
      r.onerror=fb; r.readAsArrayBuffer(file);
    } else if(file.type==='video/mp4'||file.type==='video/quicktime'||file.type==='video/x-m4v'||/\.(mp4|mov|m4v)$/i.test(file.name||'')){
      var trySlice=function(blob,last){
        var r2=new FileReader();
        r2.onload=function(ev){
          var d=readMp4CreationDate(ev.target.result);
          if(d){resolve(d);return;}
          if(!last&&file.size>2*1024*1024) trySlice(file.slice(Math.max(0,file.size-2*1024*1024)),true);
          else fb();
        };
        r2.onerror=fb; r2.readAsArrayBuffer(blob);
      };
      trySlice(file.slice(0,Math.min(file.size,2*1024*1024)),file.size<=2*1024*1024);
    } else { fb(); }
  });
  // Hard safety timeout: if the FileReader never fires onload/onerror (can
  // happen on mobile when the browser is backgrounded for the camera app),
  // resolve with the file lastModified date instead of hanging forever.
  var timeoutFallback = new Promise(function(resolve){
    setTimeout(function(){
      resolve(file.lastModified ? new Date(file.lastModified).toISOString() : null);
    }, 2500);
  });
  return Promise.race([inner, timeoutFallback]);
}

// ── GOOGLE DRIVE SYNC ──────────────────────────────────────────────────────
async function findOrCreateDriveFile(token){
  // Search for existing file
  var q = encodeURIComponent("name='"+GDRIVE_FILE_NAME+"' and trashed=false and mimeType='application/json'");
  var resp = await fetch('https://www.googleapis.com/drive/v3/files?q='+q+'&fields=files(id,name)',{
    headers:{Authorization:'Bearer '+token}
  });
  if(!resp.ok) return null;
  var data = await resp.json();
  if(data.files && data.files.length > 0){
    return data.files[0].id;
  }
  return null; // will be created on first save
}

// ── GOOGLE DRIVE MEDIA STORAGE ──────────────────────────────────────────────
// Photos and videos are no longer embedded as base64 inside the sessions
// JSON. Instead, each file is uploaded to Drive under a per-session folder
// that the user explicitly picks (or creates) once, the first time they
// attach media to that session. We keep only lightweight references
// (driveId, folder paths) plus a small JPEG thumbnail for offline/instant
// preview. This avoids bloating the synced JSON and prevents mobile
// browsers from running out of memory when handling large video files.
//
// Folder layout in Drive (user-controlled, app only creates subfolders
// inside the session folder the user picks):
//   Field Service Log/
//     field_service_log_data.json   (JSON backup)
//     Outputs/
//       {whatever folder the user picks or creates for a session}/
//         photos/
//         videos/

function sanitizeDriveName(s){
  return (s||'untitled').toString().trim().replace(/[\\/:*?"<>|]/g,'_').replace(/\s+/g,'_').slice(0,80) || 'untitled';
}

// Finds (without creating) a folder by name under a given parent. Returns
// the folder ID, or null if not found.
async function findFolder(token, name, parentId){
  var q = "name='"+name.replace(/'/g,"\\'")+"' and trashed=false and mimeType='application/vnd.google-apps.folder'"
    + (parentId ? " and '"+parentId+"' in parents" : " and 'root' in parents");
  var resp = await fetch('https://www.googleapis.com/drive/v3/files?q='+encodeURIComponent(q)+'&fields=files(id,name)',{
    headers:{Authorization:'Bearer '+token}
  });
  if(!resp.ok) return null;
  var data = await resp.json();
  return (data.files && data.files.length>0) ? data.files[0].id : null;
}

async function createFolder(token, name, parentId){
  var metadata = {name:name, mimeType:'application/vnd.google-apps.folder'};
  if(parentId) metadata.parents = [parentId];
  var resp = await fetch('https://www.googleapis.com/drive/v3/files',{
    method:'POST',
    headers:{Authorization:'Bearer '+token,'Content-Type':'application/json'},
    body: JSON.stringify(metadata)
  });
  if(!resp.ok) return null;
  var created = await resp.json();
  return created.id;
}

async function findOrCreateFolder(token, name, parentId){
  var existing = await findFolder(token, name, parentId);
  if(existing) return existing;
  return await createFolder(token, name, parentId);
}

// Returns the "Field Service Log" root folder ID, creating it once if it
// does not exist yet, and caching the ID locally so we never have to ask
// again. This is the only folder the app creates automatically without
// asking the user — everything below "Outputs/" is user-chosen.
var cachedRootFolderId = null;
async function getRootFolder(token){
  if(cachedRootFolderId) return cachedRootFolderId;
  try{
    var stored = localStorage.getItem(ROOT_FOLDER_KEY);
    if(stored){ cachedRootFolderId = stored; return stored; }
  }catch(e){}
  var rootId = await findOrCreateFolder(token, 'Field Service Log', null);
  if(rootId){
    cachedRootFolderId = rootId;
    try{ localStorage.setItem(ROOT_FOLDER_KEY, rootId); }catch(e){}
  }
  return rootId;
}

// Returns (creating if needed) the "Outputs" folder directly under the
// "Field Service Log" root. This is purely an organizational folder the
// user asked for; sessions folders live inside it.
async function getOutputsFolder(token){
  var rootId = await getRootFolder(token);
  if(!rootId) return null;
  return await findOrCreateFolder(token, 'Outputs', rootId);
}

// Opens the Google Picker so the user can choose an existing folder, or
// create a new one, to act as a given session media folder. Returns
// {id, name} of the chosen folder, or null if the user cancelled.
async function pickSessionFolder(token){
  await loadPickerLib();
  if(!window.google || !window.google.picker) return null;
  var outputsId = await getOutputsFolder(token);
  return new Promise(function(resolve){
    try{
      var view = new google.picker.DocsView(google.picker.ViewId.FOLDERS)
        .setIncludeFolders(true)
        .setSelectFolderEnabled(true)
        .setMimeTypes('application/vnd.google-apps.folder');
      if(outputsId) view.setParent(outputsId);
      var picker = new google.picker.PickerBuilder()
        .setOAuthToken(token)
        .setDeveloperKey(PICKER_API_KEY)
        .setAppId(PICKER_APP_ID)
        .addView(view)
        .setTitle('Select or create a folder for this service visit')
        .setCallback(function(data){
          if(data.action === google.picker.Action.PICKED){
            var doc = data.docs && data.docs[0];
            if(doc){ resolve({id:doc.id, name:doc.name}); return; }
          }
          if(data.action === google.picker.Action.CANCEL){ resolve(null); }
        })
        .build();
      picker.setVisible(true);
    }catch(e){ resolve(null); }
  });
}

// Builds (creating if needed) the photos/videos subfolders inside a
// session chosen Drive folder. The session folder itself must already
// be picked (session.driveFolderId set) before this is called.
async function getSessionMediaFolder(token, session, kind){
  if(!session.driveFolderId) return null;
  return await findOrCreateFolder(token, kind, session.driveFolderId);
}

// Uploads a File/Blob to Drive inside the given session photos/videos
// folder. Returns {driveId, name} on success, or null on failure.
async function uploadMediaToDrive(session, file, kind){
  var token = await ensureToken();
  if(!token) return null;
  var folderId = await getSessionMediaFolder(token, session, kind);
  if(!folderId) return null;
  var metadata = {name:file.name||('file_'+Date.now()), parents:[folderId]};
  var boundary = 'fsl_media_'+Date.now();
  var metaPart = '--'+boundary+'\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n'+JSON.stringify(metadata)+'\r\n';
  var fileHeader = '--'+boundary+'\r\nContent-Type: '+(file.type||'application/octet-stream')+'\r\n\r\n';
  var closing = '\r\n--'+boundary+'--';

  var fileBuffer = await file.arrayBuffer();
  var encoder = new TextEncoder();
  var metaBytes = encoder.encode(metaPart);
  var headerBytes = encoder.encode(fileHeader);
  var closingBytes = encoder.encode(closing);
  var totalLen = metaBytes.length + headerBytes.length + fileBuffer.byteLength + closingBytes.length;
  var body = new Uint8Array(totalLen);
  var offset = 0;
  body.set(metaBytes, offset); offset += metaBytes.length;
  body.set(headerBytes, offset); offset += headerBytes.length;
  body.set(new Uint8Array(fileBuffer), offset); offset += fileBuffer.byteLength;
  body.set(closingBytes, offset);

  try{
    var resp = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id,name',{
      method:'POST',
      headers:{Authorization:'Bearer '+token,'Content-Type':'multipart/related; boundary='+boundary},
      body: body
    });
    if(resp.ok){
      var created = await resp.json();
      return {driveId:created.id, name:created.name};
    }
  }catch(e){}
  return null;
}

// Renames a file already stored on Drive. Called whenever the user edits an
// attachment display name in the app, so the actual Drive filename stays
// in sync with what is shown.
async function renameMediaOnDrive(driveId, newName){
  var token = await ensureToken();
  if(!token || !driveId) return false;
  try{
    var resp = await fetch('https://www.googleapis.com/drive/v3/files/'+driveId,{
      method:'PATCH',
      headers:{Authorization:'Bearer '+token,'Content-Type':'application/json'},
      body: JSON.stringify({name:newName})
    });
    return resp.ok;
  }catch(e){ return false; }
}

// Returns a direct streaming/download URL for a Drive file (requires the
// current access token, appended as a query param since <video>/<img> tags
// cannot send Authorization headers).
function getDriveStreamUrl(driveId){
  if(!accessToken || !driveId) return null;
  return 'https://www.googleapis.com/drive/v3/files/'+driveId+'?alt=media&access_token='+encodeURIComponent(accessToken);
}

async function loadFromDrive(){
  var token = await ensureToken();
  if(!token){ setSyncStatus('error','Not authenticated'); return; }
  setSyncStatus('loading','Loading from Google Drive...');
  try{
    if(!gdriveFileId) gdriveFileId = await findOrCreateDriveFile(token);
    saveTokenLocal();
    if(!gdriveFileId){ setSyncStatus('ok','Google Drive connected \u2713'); return; }
    var resp = await fetch('https://www.googleapis.com/drive/v3/files/'+gdriveFileId+'?alt=media',{
      headers:{Authorization:'Bearer '+token}
    });
    if(resp.ok){
      var data = await resp.json();
      if(Array.isArray(data)){
        var remoteIds = new Set(data.map(function(s){return s.id;}));
        var localOnly = sessions.filter(function(s){return !remoteIds.has(s.id);});
        sessions = data.concat(localOnly);
        saveLocal();
      }
      setSyncStatus('ok','Synced \u2713');
    } else if(resp.status===404){
      gdriveFileId=null; saveTokenLocal();
      setSyncStatus('ok','Google Drive connected \u2713');
    } else {
      setSyncStatus('error','Error reading from Drive');
    }
  }catch(e){
    setSyncStatus('error','No connection (using local data)');
  }
}

async function saveToDrive(){
  var token = await ensureToken();
  if(!token){ saveLocal(); return; }
  setSyncStatus('loading','Saving to Google Drive...');
  try{
    var body = JSON.stringify(sessions);
    var resp;
    if(gdriveFileId){
      // Update existing file
      resp = await fetch('https://www.googleapis.com/upload/drive/v3/files/'+gdriveFileId+'?uploadType=media',{
        method:'PATCH',
        headers:{Authorization:'Bearer '+token,'Content-Type':'application/json'},
        body: body
      });
    } else {
      // Create new file with metadata
      var meta = JSON.stringify({name:GDRIVE_FILE_NAME, mimeType:'application/json'});
      var boundary = 'fsl_boundary_'+Date.now();
      var multipart = '--'+boundary+'\r\nContent-Type: application/json\r\n\r\n'+meta
        +'\r\n--'+boundary+'\r\nContent-Type: application/json\r\n\r\n'+body+'\r\n--'+boundary+'--';
      resp = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart',{
        method:'POST',
        headers:{Authorization:'Bearer '+token,'Content-Type':'multipart/related; boundary='+boundary},
        body: multipart
      });
      if(resp.ok){
        var created = await resp.json();
        gdriveFileId = created.id;
        saveTokenLocal();
      }
    }
    if(resp&&resp.ok){
      isDirty=false; saveLocal();
      setSyncStatus('ok','Saved to Drive \u2713 '+fts(now()).slice(12));
    } else {
      saveLocal(); setSyncStatus('error','Error saving to Drive');
    }
  }catch(e){
    saveLocal(); setSyncStatus('error','No connection (saved locally)');
  }
}

function scheduleSave(){
  isDirty=true; saveLocal();
  if(syncTimer) clearTimeout(syncTimer);
  syncTimer=setTimeout(function(){if(isDirty&&isLoggedIn)saveToDrive();},2000);
}

function hasUnsavedInput(){
  var entIn = el('entIn');
  if(entIn && entIn.value.trim()) return true;
  var tagIn = el('tagIn');
  if(tagIn && tagIn.value.trim()) return true;
  if(pImgs.length > 0) return true;
  var eText = el('eText');
  if(eText && editingEntryId) return true; // edit modal open
  return false;
}

function scheduleSync(){
  setInterval(function(){
    if(isLoggedIn && !isDirty && !hasUnsavedInput()) loadFromDrive().then(function(){renderAll();});
  },30000);
}

function setSyncStatus(state, msg){
  var bar=el('syncBar'), st=el('syncStatus');
  if(state==='loading'){
    bar.style.display='flex'; el('syncMsg').innerHTML=msg;
    st.innerHTML='<span class="spinner"></span>';
  } else if(state==='ok'){
    bar.style.display='none';
    st.innerHTML='<span style="color:var(--green)">\u25cf Drive</span>';
  } else if(state==='error'){
    bar.style.display='none';
    st.innerHTML='<span style="color:var(--red)" title="'+esc(msg)+'">\u25cf Local</span>';
  } else {
    bar.style.display='none'; st.innerHTML='';
  }
}

function rSessions(){
  var list=el('sList');
  el('sideCount').textContent='Sessions ('+sessions.length+')';
  el('btnSideX').style.display=mob()?'block':'none';
  if(!sessions.length){
    list.innerHTML='<div style="font-size:12px;color:var(--tx3);padding:20px 10px;text-align:center;font-family:monospace">No sessions yet.<br>Create a new one.</div>';
    return;
  }
  list.innerHTML='';
  sessions.forEach(function(s){
    var tm=TM[s.type]||TM.commissioning;
    var errs=(s.entries||[]).filter(function(e){return e.severity==='error';}).length;
    var div=document.createElement('div');
    div.className='sitem'+(s.id===aid?' active':'');
    div.innerHTML='<span class="sitem-badge" style="background:'+tm.bg+';color:'+tm.tx+'">'+tm.abbr+'</span>'
      +(errs?'<span style="float:right;background:rgba(239,68,68,.15);color:#ef4444;font-size:10px;padding:1px 5px;border-radius:3px;font-family:monospace">'+errs+' err</span>':'')
      +'<div class="sitem-name">'+esc(s.client||'—')+'</div>'
      +'<div class="sitem-sub">'+esc(s.machine||'')+'</div>'
      +'<div class="sitem-sub" style="margin-top:2px">'+(s.status==='open'?'🟢 Open':'🔴 Closed')+' · '+(s.entries||[]).length+' entries</div>'
      +'<button class="sitem-del" title="Delete">&#10005;</button>';
    div.addEventListener('click',function(){aid=s.id;if(mob())closeSide();renderAll();});
    div.querySelector('.sitem-del').addEventListener('click',function(e){
      e.stopPropagation();
      if(confirm('Delete this service visit?\n\nA backup JSON file will be downloaded automatically before deletion so you can recover it later.')){
        // Export a backup of just this session before deleting it
        var backup = JSON.stringify([s], null, 2);
        var date = new Date().toISOString().slice(0,10);
        var safeName = (s.client||'session').replace(/[^a-zA-Z0-9_-]/g,'_').slice(0,40);
        var filename = 'backup_' + safeName + '_' + date + '.json';
        var blob = new Blob([backup], {type:'application/json;charset=utf-8'});
        var url = URL.createObjectURL(blob);
        var a = document.createElement('a');
        a.href=url; a.download=filename;
        document.body.appendChild(a); a.click();
        document.body.removeChild(a); URL.revokeObjectURL(url);
        // Now delete
        sessions=sessions.filter(function(x){return x.id!==s.id;});
        if(aid===s.id)aid=null;
        scheduleSave();renderAll();
      }
    });
    list.appendChild(div);
  });
}

          // Videos are never read into memory as base64: we extract a small
          // thumbnail frame, then stream the original file straight to
          // Google Drive. Only the Drive file ID, name and thumbnail are
          // kept in the entry, keeping the synced JSON small and avoiding
          // mobile out-of-memory crashes.
          var img={data:null, type:'video', name:file.name, uploadStatus:'uploading', poster:null};
          pImgs.push(img);
          rThumbs();

          pendingExifReads++;
          getFileTimestamp(file).then(function(ts){
            img.capturedAt=ts;
            pendingExifReads--;
            rThumbs();
          });

          pendingExifReads++;
          generateVideoThumbnail(file).then(function(thumb){
            if(thumb) img.poster=thumb;
            pendingExifReads--;
            rThumbs();
          });

          if(activeSession && isLoggedIn && activeSession.driveFolderId){
            pendingExifReads++;
            uploadMediaToDrive(activeSession, file, 'videos').then(function(result){
              if(result){
                img.driveId = result.driveId;
                img.name = result.name;
                img.uploadStatus = 'done';
              } else {
                img.uploadStatus = 'error';
              }
              pendingExifReads--;
              rThumbs();
              // The entry may already have been saved (if the user pressed
              // Add before the upload finished); persist the driveId now
              // that it is available so it survives a reload/sync.
              scheduleSave();
            });
          } else {
            // Not logged in to Drive: cannot store the video remotely, and
            // we deliberately do not fall back to embedding it as base64
            // (that is exactly what causes mobile crashes). Mark it so the
            // UI can warn the user.
            img.uploadStatus = (isLoggedIn ? 'no-folder' : 'no-drive');
          }
          return;
        }

        // Photos: small enough to keep the existing base64 flow, but we
        // also upload them to Drive in the background for the requested
        // folder organization (Field Service Log/{session}/photos).
        var r=new FileReader();
        r.onload=function(ev){
          var img={data:ev.target.result,type:'image',name:file.name};
          pImgs.push(img);
          rThumbs();
          pendingExifReads++;
          getFileTimestamp(file).then(function(ts){
            img.capturedAt=ts;
            pendingExifReads--;
            rThumbs();
          });
          if(activeSession && isLoggedIn && activeSession.driveFolderId){
            uploadMediaToDrive(activeSession, file, 'photos').then(function(result){
              if(result){ img.driveId=result.driveId; img.name=result.name; }
            });
          }
        };
        r.readAsDataURL(file);
      });
      e.target.value='';
    });
  }

  el('filtIn').addEventListener('input',function(e){ft=e.target.value;renderMain();});
}

function rThumbs(){
  var c=el('pThumbs');if(!c)return;
  c.innerHTML='';
  pImgs.forEach(function(img,i){
    var d=document.createElement('div');d.className='thumb';
    var isVideo = img.type==='video';
    var thumbSrc = isVideo ? (img.poster||'') : img.data;
    var statusBadge = '';
    if(isVideo){
      if(img.uploadStatus==='uploading') statusBadge='<div class="thumb-status uploading">&#8635;</div>';
      else if(img.uploadStatus==='error') statusBadge='<div class="thumb-status error" title="Upload failed">&#9888;</div>';
      else if(img.uploadStatus==='no-drive') statusBadge='<div class="thumb-status error" title="Sign in to Google Drive to attach videos">&#9888;</div>';
      else if(img.uploadStatus==='no-folder') statusBadge='<div class="thumb-status error" title="Pick a Drive folder for this session first">&#9888;</div>';
    }
    d.innerHTML=(thumbSrc?'<img src="'+thumbSrc+'" alt="Pending">':'<div class="thumb-placeholder">&#127909;</div>')
      +(isVideo?'<div class="thumb-vid-badge">&#9654;</div>':'')
      +statusBadge
      +'<button class="thumb-del" data-i="'+i+'">&#10005;</button>';
    d.querySelector('.thumb-del').addEventListener('click',function(){pImgs=pImgs.filter(function(_,j){return j!==i;});rThumbs();});
    c.appendChild(d);
  });
}

function earliestCapturedAt(images){
  var dates=(images||[]).map(function(img){return img.capturedAt;}).filter(Boolean);
  if(!dates.length) return null;
  dates.sort();
  return dates[0];
}

function addEntry(){
  var entIn=el('entIn');if(!entIn)return;
  var text=entIn.value.trim();if(!text)return;
  var active=sessions.find(function(s){return s.id===aid;});
  if(!active||active.status!=='open')return;

  // Capture current field values up front so they survive even if the DOM
  // gets re-rendered while we wait for pending EXIF/MP4 reads to finish.
  var capturedText = text;
  var capturedSev = el('sevSel') ? el('sevSel').value : 'info';
  var capturedTag = el('tagIn') ? el('tagIn').value.trim() : '';

  var waited = 0;
  function tryFinish(){
    var btn = el('btnAdd');
    if(pendingExifReads > 0 && waited < 3000){
      if(btn){ btn.disabled=true; btn.textContent='Processing photos...'; }
      waited += 150;
      setTimeout(tryFinish, 150);
      return;
    }
    // Either all reads finished, or we hit the 3s safety timeout: proceed
    // anyway using whatever capturedAt data is available so far.
    if(btn){ btn.disabled=false; btn.innerHTML='&#8629; Add'; }
    var imgs = pImgs.slice();
    var photoTs = earliestCapturedAt(imgs);
    var e = {id:uid(), ts:photoTs||now(), text:capturedText, severity:capturedSev, tag:capturedTag, images:imgs};
    if(photoTs) e.tsFromPhoto=true;
    sessions = sessions.map(function(s){return s.id===aid?Object.assign({},s,{entries:(s.entries||[]).concat([e])}):s;});
    pImgs=[];
    scheduleSave();
    renderAll();
  }
  tryFinish();
}

function renderEFileNames(){
  var list = el('eFileNames');
  if(!list) return;
  list.innerHTML = '';
  eImgs.forEach(function(img, i){
    var isVideo = img.type==='video';
    var row = document.createElement('div');
    row.className = 'file-name-row';
    row.innerHTML = '<span class="fnr-icon">'+(isVideo?'&#127909;':'&#128247;')+'</span>'
      + '<input type="text" value="'+esc(img.name||'')+'" data-i="'+i+'">'
      + '<span class="fnr-status" data-i="'+i+'"></span>';
    var input = row.querySelector('input');
    var statusEl = row.querySelector('.fnr-status');
    input.addEventListener('change', function(){
      var newName = input.value.trim();
      if(!newName || newName===img.name) return;
      var oldName = img.name;
      img.name = newName;
      if(img.driveId){
        statusEl.innerHTML = '<span class="spinner"></span>';
        renameMediaOnDrive(img.driveId, newName).then(function(ok){
          statusEl.textContent = ok ? '\u2713' : '\u26A0';
          if(!ok) img.name = oldName; // revert local label if remote rename failed
          if(!ok) input.value = oldName;
          scheduleSave();
        });
      } else {
        scheduleSave();
      }
    });
    list.appendChild(row);
  });
}

function saveEditEntry(){
  var text=el('eText').value.trim();
  if(!text){alert('Description cannot be empty.');return;}
  if(!editingEntryId)return;

  var capturedText = text;
  var capturedSev = el('eSev').value;
  var capturedTag = el('eTag').value.trim();
  var entryId = editingEntryId;

  var waited = 0;
  function tryFinish(){
    var btn = el('eSave');
    if(pendingExifReadsEdit > 0 && waited < 3000){
      if(btn){ btn.disabled=true; btn.textContent='Processing photos...'; }
      waited += 150;
      setTimeout(tryFinish, 150);
      return;
    }
    if(btn){ btn.disabled=false; btn.innerHTML='&#10003; Save changes'; }
    var newImgs = eImgs.slice();
    sessions = sessions.map(function(s){
      if(s.id!==aid) return s;
      var newEntries = (s.entries||[]).map(function(en){
        if(en.id!==entryId) return en;
        return Object.assign({},en,{text:capturedText, severity:capturedSev, tag:capturedTag, images:newImgs, editedAt:now()});
      });
      return Object.assign({},s,{entries:newEntries});
    });
    closeEditEntry();
    scheduleSave();
    renderAll();
  }
  tryFinish();
}
el('eSave').addEventListener('click',saveEditEntry);

function deleteEntry(entryId){

  sessions=sessions.map(function(s){
    if(s.id!==aid)return s;
    return Object.assign({},s,{entries:(s.entries||[]).filter(function(en){return en.id!==entryId;})});

  scheduleSave();renderAll();
}

  var s={id:uid(),client:c,machine:m,location:el('mLoc').value.trim(),tech:el('mTec').value.trim(),type:el('mTyp').value,status:'open',createdAt:now(),entries:[],notes:'',driveFolderId:null,driveFolderName:null};

  // If connected to Google Drive, immediately prompt the user to pick or

  // without asking again. If the user cancels, the session is still usable
  // -- they can pick a folder later from the session header.
  if(isLoggedIn){
    var token = await ensureToken();
    if(token){
      var folder = await pickSessionFolder(token);
      if(folder){
        sessions = sessions.map(function(x){
          return x.id===s.id ? Object.assign({}, x, {driveFolderId:folder.id, driveFolderName:folder.name}) : x;
        });
        scheduleSave();
        renderAll();
      }
    }
  }
});

  fmt = fmt || 'html';
  var base = (s.client||'sessio').replace(/\s+/g,'_')+'_'+s.createdAt.slice(0,10);

  if(fmt==='html'){
    downloadBlob(new Blob([buildReportHtml(s)],{type:'text/html;charset=utf-8'}), 'report_'+base+'.html');

  } else if(fmt==='pdf'){
    // PDF via print: open report in a new window and trigger print dialog.
    // Videos cannot play in a print/PDF context, so we render their
    // extracted thumbnail frame instead (forPrint=true).
    var win = window.open('','_blank');
    if(!win){ alert('Please allow pop-ups to generate the PDF.'); return; }
    win.document.write(buildReportHtml(s, true));
    win.document.close();
    win.onload = function(){
      setTimeout(function(){ win.print(); }, 300);
    };

  } else if(fmt==='docx'){
    exportDocx(s, base);
  }
}

function exportDocx(s, base){
  // Load docx library from CDN if not already loaded
  if(!window.docx){
    var script = document.createElement('script');
    script.src = 'https://cdnjs.cloudflare.com/ajax/libs/docx/8.5.0/docx.umd.min.js';
    script.onload = function(){ exportDocx(s, base); };
    script.onerror = function(){ alert('Could not load the DOCX library. Check your internet connection.'); };
    document.head.appendChild(script);
    return;
  }

  var D = window.docx;
  var tm = TM[s.type]||TM.commissioning;
  var entries = s.entries||[];
  var errs = entries.filter(function(e){return e.severity==='error';}).length;
  var warns = entries.filter(function(e){return e.severity==='warning';}).length;
  var oks = entries.filter(function(e){return e.severity==='ok';}).length;

  var border = {style:D.BorderStyle.SINGLE, size:1, color:'CCCCCC'};
  var borders = {top:border, bottom:border, left:border, right:border};
  var cellMargins = {top:80, bottom:80, left:120, right:120};

  // Header row
  var hdrCellOpts = function(txt){
    return new D.TableCell({
      borders:borders, margins:cellMargins,
      shading:{fill:'1F2937', type:D.ShadingType.CLEAR},
      children:[new D.Paragraph({children:[new D.TextRun({text:txt, bold:true, color:'FFFFFF', size:18, font:'Arial'})]})]
    });
  };

  // Convert a data URL (e.g. "data:image/jpeg;base64,...") into a Uint8Array
  // so it can be embedded as an ImageRun in the docx document. Also returns
  // the detected docx image type ('jpg'|'png'|'gif'|'bmp') based on the
  // data URL MIME type, defaulting to 'jpg' for anything unrecognized.
  function dataUrlToImageData(dataUrl){
    try{
      var mimeMatch = /^data:image\/([a-zA-Z+]+);base64,/.exec(dataUrl);
      var mime = mimeMatch ? mimeMatch[1].toLowerCase() : 'jpeg';
      var type = 'jpg';
      if(mime.indexOf('png')>=0) type='png';
      else if(mime.indexOf('gif')>=0) type='gif';
      else if(mime.indexOf('bmp')>=0) type='bmp';
      var base64 = dataUrl.split(',')[1];
      var binary = atob(base64);
      var bytes = new Uint8Array(binary.length);
      for(var i=0;i<binary.length;i++) bytes[i] = binary.charCodeAt(i);
      return {bytes:bytes, type:type};
    }catch(e){ return null; }
  }

  // Data rows
  var dataRows = entries.map(function(e){
    var sm = SM[e.severity]||SM.info;
    var sevColor = sm.tx.replace('#','');
    var fill = e.severity==='error'?'FEF2F2': e.severity==='warning'?'FFFBEB': e.severity==='ok'?'F0FDF4':'FFFFFF';

    // Build attachment cell content: each photo becomes an embedded image,
    // each video becomes its extracted thumbnail (or a placeholder) plus
    // the original filename printed underneath.
    var attachChildren = [];
    (e.images||[]).forEach(function(img){
      var isVideo = img.type==='video';
      var imgSrc = isVideo ? img.poster : img.data;
      if(imgSrc){
        var imgData = dataUrlToImageData(imgSrc);
        if(imgData){
          try{
            attachChildren.push(new D.Paragraph({spacing:{after:20}, children:[
              new D.ImageRun({data:imgData.bytes, type:imgData.type, transformation:{width:70, height:50}})
            ]}));
          }catch(err){ /* image embed failed, skip silently */ }
        }
      }
      if(isVideo){
        attachChildren.push(new D.Paragraph({spacing:{after:60}, children:[
          new D.TextRun({text:'\u25B6 '+(img.name||'video'), size:14, font:'Arial', color:'6B7280', italics:true})
        ]}));
      }
    });
    if(!attachChildren.length){
      attachChildren.push(new D.Paragraph({children:[new D.TextRun({text:'', size:18})]}));
    }

    return new D.TableRow({children:[
      new D.TableCell({borders:borders, margins:cellMargins, width:{size:1800,type:D.WidthType.DXA},
        shading:{fill:fill, type:D.ShadingType.CLEAR},
        children:[new D.Paragraph({children:[new D.TextRun({text:fts(e.ts)+(e.tsFromPhoto?' [photo]':''), size:16, font:'Courier New', color:'6B7280'})]})]}),
      new D.TableCell({borders:borders, margins:cellMargins, width:{size:900,type:D.WidthType.DXA},
        shading:{fill:fill, type:D.ShadingType.CLEAR},
        children:[new D.Paragraph({children:[new D.TextRun({text:sm.label, bold:true, size:18, color:sevColor, font:'Arial'})]})]}) ,
      new D.TableCell({borders:borders, margins:cellMargins, width:{size:900,type:D.WidthType.DXA},
        shading:{fill:fill, type:D.ShadingType.CLEAR},
        children:[new D.Paragraph({children:[new D.TextRun({text:e.tag||'', size:18, font:'Courier New', color:'1D4ED8'})]})]}) ,
      new D.TableCell({borders:borders, margins:cellMargins, width:{size:4626,type:D.WidthType.DXA},
        shading:{fill:fill, type:D.ShadingType.CLEAR},
        children:[new D.Paragraph({children:[new D.TextRun({text:e.text||'', size:20, font:'Arial'})]})]}) ,
      new D.TableCell({borders:borders, margins:cellMargins, width:{size:1000,type:D.WidthType.DXA},
        shading:{fill:fill, type:D.ShadingType.CLEAR},
        children:attachChildren})
    ]});
  });

  // Meta grid paragraph helper
  function metaPair(label, value){
    return new D.Paragraph({spacing:{after:80}, children:[
      new D.TextRun({text:label+': ', bold:true, size:18, font:'Arial'}),
      new D.TextRun({text:value||'—', size:18, font:'Arial'})
    ]});
  }

  var children = [
    // Title
    new D.Paragraph({
      spacing:{after:80},
      border:{bottom:{style:D.BorderStyle.SINGLE, size:6, color:'F5A623', space:1}},
      children:[new D.TextRun({text:'Informe d\'Assistencia Techniciana', bold:true, size:40, font:'Arial', color:'111827'})]
    }),
    new D.Paragraph({spacing:{after:40}, children:[new D.TextRun({text:'Type: '+tm.label, size:20, font:'Arial', color:'6B7280'})]}),
    new D.Paragraph({spacing:{after:200}, children:[new D.TextRun({text:'Generated on '+fts(new Date().toISOString()), size:18, font:'Arial', color:'9CA3AF'})]}),
    // Meta
    metaPair('Client', s.client),
    metaPair('Machine / Equipment', s.machine),
    metaPair('Location', s.location),
    metaPair('Technician', s.tech),
    metaPair('Start', fts(s.createdAt)),
    metaPair('Status', s.status==='open'?'Open':'Closed'),
    new D.Paragraph({spacing:{after:200}, children:[new D.TextRun({text:''})]}),
    // Stats
    new D.Paragraph({spacing:{after:40}, children:[
      new D.TextRun({text:'Issues: ', bold:true, size:20, font:'Arial', color:'DC2626'}),
      new D.TextRun({text:errs+'   ', size:20, font:'Arial', color:'DC2626'}),
      new D.TextRun({text:'Warnings: ', bold:true, size:20, font:'Arial', color:'D97706'}),
      new D.TextRun({text:warns+'   ', size:20, font:'Arial', color:'D97706'}),
      new D.TextRun({text:'Resolved: ', bold:true, size:20, font:'Arial', color:'16A34A'}),
      new D.TextRun({text:oks+'   ', size:20, font:'Arial', color:'16A34A'}),
      new D.TextRun({text:'Total: ', bold:true, size:20, font:'Arial'}),
      new D.TextRun({text:''+entries.length, size:20, font:'Arial'})
    ]}),
    new D.Paragraph({spacing:{after:160}, children:[new D.TextRun({text:''})]}),
    // Log table
    new D.Table({
      width:{size:9226, type:D.WidthType.DXA},
      columnWidths:[1800,900,900,4626,1000],
      rows:[
        new D.TableRow({tableHeader:true, children:[
          hdrCellOpts('Timestamp'),
          hdrCellOpts('Severity'),
          hdrCellOpts('Tag'),
          hdrCellOpts('Description'),
          hdrCellOpts('Attachments')
        ]})
      ].concat(dataRows)
    }),
    new D.Paragraph({spacing:{after:200}, children:[new D.TextRun({text:''})]}),
  ];

  // Notes
  if(s.notes){
    children.push(new D.Paragraph({spacing:{after:80}, children:[new D.TextRun({text:'General notes:', bold:true, size:20, font:'Arial'})]}));
    children.push(new D.Paragraph({spacing:{after:400}, children:[new D.TextRun({text:s.notes, size:20, font:'Arial'})]}));
  }

  // Signatures
  children.push(new D.Paragraph({spacing:{before:800, after:40}, border:{top:{style:D.BorderStyle.SINGLE, size:2, color:'CCCCCC', space:1}}, children:[new D.TextRun({text:'Technician signature: '+(s.tech||'_________________'), size:20, font:'Arial'})]}));
  children.push(new D.Paragraph({spacing:{before:600, after:40}, border:{top:{style:D.BorderStyle.SINGLE, size:2, color:'CCCCCC', space:1}}, children:[new D.TextRun({text:'Client / Recipient signature: _________________', size:20, font:'Arial'})]}));
  children.push(new D.Paragraph({spacing:{before:200}, children:[new D.TextRun({text:'ID: '+s.id, size:16, font:'Arial', color:'9CA3AF'})]}));

  var doc = new D.Document({
    styles:{default:{document:{run:{font:'Arial', size:20}}}},
    sections:[{
      properties:{page:{size:{width:11906, height:16838}, margin:{top:1440, right:1440, bottom:1440, left:1440}}},
      children:children
    }]
  });

  D.Packer.toBlob(doc).then(function(blob){
    downloadBlob(blob, 'report_'+base+'.docx');
  }).catch(function(err){
    alert('Error generating DOCX: '+err.message);
  });
}

// ── SERVICE WORKER ─────────────────────────────────────────────────────────
if('serviceWorker' in navigator){
  var sw="self.addEventListener('install',function(){self.skipWaiting();});self.addEventListener('activate',function(e){self.clients.claim();});self.addEventListener('fetch',function(e){if(e.request.url.indexOf('googleapis.com')>=0||e.request.url.indexOf('accounts.google.com')>=0){return;}e.respondWith(fetch(e.request).catch(function(){return caches.match(e.request);}));});";
  var blob=new Blob([sw],{type:'application/javascript'});
  navigator.serviceWorker.register(URL.createObjectURL(blob),{scope:'./'}).catch(function(){});
}

// ── IMPORT JSON ────────────────────────────────────────────────────────────
el('btnImport').addEventListener('click', function(){
  el('importFileIn').click();
});
el('importFileIn').addEventListener('change', function(e){
  var file = e.target.files && e.target.files[0];
  if(!file) return;
  var r = new FileReader();
  r.onload = function(ev){
    try{
      var data = JSON.parse(ev.target.result);
      if(!Array.isArray(data)) throw new Error('Expected a JSON array');
      var count = data.length;
      if(count === 0){ alert('The file contains no sessions.'); return; }
      // Merge: add imported sessions that do not already exist (by id)
      var existingIds = new Set(sessions.map(function(s){ return s.id; }));
      var newSessions = data.filter(function(s){ return s.id && !existingIds.has(s.id); });
      var skipped = count - newSessions.length;
      sessions = newSessions.concat(sessions);
      saveLocal();
      renderAll();
      var msg = 'Imported ' + newSessions.length + ' session(s).';
      if(skipped > 0) msg += ' ' + skipped + ' skipped (already exist).';
      alert(msg);
    } catch(err){
      alert('Import failed: ' + err.message);
    }
    e.target.value = '';
  };
  r.onerror = function(){ alert('Could not read file.'); };
  r.readAsText(file);
});

// Close export dropdowns when clicking outside
document.addEventListener('click',function(){
  ['expMenuHdr','expMenuClosed'].forEach(function(id){
    var m=el(id); if(m) m.style.display='none';
  });
});

renderAll();
})();
