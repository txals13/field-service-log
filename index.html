<style>
/* ── Reset & Base ────────────────────────────────────────────── */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;font-size:14px;line-height:1.5;transition:background .2s,color .2s}

/* ── Design tokens — dark (default) ─────────────────────────── */
:root{
  --bg0:#111827;--bg1:#1f2937;--bg2:#374151;
  --br:#374151;--br2:#4b5563;
  --tx1:#f9fafb;--tx2:#9ca3af;--tx3:#6b7280;
  --gold:#f59e0b;--goldDim:#b45309;--goldBg:rgba(245,158,11,.1);--goldTx:#fcd34d;
  --green:#10b981;--greenBg:rgba(16,185,129,.1);
  --red:#ef4444;--redBg:rgba(239,68,68,.1);
  --orange:#f97316;--orangeBg:rgba(249,115,22,.1);
  --blue:#3b82f6;--blueBg:rgba(59,130,246,.1);
  --rm:6px;--rl:10px;
}
/* ── Light theme ─────────────────────────────────────────────── */
:root.light{
  --bg0:#f3f4f6;--bg1:#ffffff;--bg2:#e5e7eb;
  --br:#e5e7eb;--br2:#d1d5db;
  --tx1:#111827;--tx2:#374151;--tx3:#9ca3af;
  --gold:#d97706;--goldDim:#b45309;--goldBg:rgba(217,119,6,.1);--goldTx:#92400e;
  --green:#059669;--greenBg:rgba(5,150,105,.08);
  --red:#dc2626;--redBg:rgba(220,38,38,.08);
  --orange:#ea580c;--orangeBg:rgba(234,88,12,.08);
  --blue:#2563eb;--blueBg:rgba(37,99,235,.08);
}
:root.light body{background:var(--bg0);color:var(--tx1)}
body{background:var(--bg0);color:var(--tx1)}

/* ── Layout ──────────────────────────────────────────────────── */
#app{display:flex;flex-direction:column;height:100vh;height:100dvh}
.topbar{display:flex;align-items:center;gap:6px;padding:0 12px;height:52px;border-bottom:1px solid var(--br);background:var(--bg1);flex-shrink:0}
.logo{font-family:monospace;font-size:14px;font-weight:700;color:var(--gold);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:.3px}
.top-badge{font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px;white-space:nowrap;max-width:160px;overflow:hidden;text-overflow:ellipsis;flex-shrink:1}
.body{display:flex;flex:1;overflow:hidden;position:relative}
/* ── Sidebar ──────────────────────────────────────────────────── */
.sidebar{width:240px;background:var(--bg1);border-right:1px solid var(--br);display:flex;flex-direction:column;overflow:hidden;transition:width .2s;flex-shrink:0}
.sidebar.collapsed{width:0;min-width:0}
@media(max-width:640px){
  .sidebar{position:absolute;inset:0;width:88%;max-width:300px;z-index:30;transform:translateX(-100%);transition:transform .25s;width:88%}
  .sidebar.open{transform:translateX(0)}
}
.side-hdr{padding:10px 12px;border-bottom:1px solid var(--br);display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.side-label{font-size:11px;color:var(--tx3);text-transform:uppercase;letter-spacing:.8px;font-weight:600}
.s-list{flex:1;overflow-y:auto;padding:6px;-webkit-overflow-scrolling:touch}
.sitem{position:relative;border:1px solid transparent;border-radius:var(--rm);padding:8px 10px;margin-bottom:3px;cursor:pointer;transition:all .15s}
.sitem:hover{background:var(--bg2);border-color:var(--br)}
.sitem.active{background:var(--bg2);border-color:var(--gold)}
.sitem-badge{font-size:10px;font-weight:700;padding:1px 7px;border-radius:20px;display:inline-block;margin-bottom:3px;font-family:monospace;letter-spacing:.3px}
.sitem-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sitem-sub{font-size:11px;color:var(--tx3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.sitem-del{position:absolute;top:6px;right:6px;background:none;border:none;color:var(--tx3);font-size:12px;padding:2px 5px;border-radius:4px;cursor:pointer;opacity:0;transition:opacity .15s}
.sitem:hover .sitem-del,.sitem.active .sitem-del{opacity:1}
@media(max-width:640px){.sitem-del{opacity:1}}
/* ── Content ──────────────────────────────────────────────────── */
.content{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.overlay{position:absolute;inset:0;z-index:25;background:rgba(0,0,0,.5);display:none}
/* ── Session header ───────────────────────────────────────────── */
.s-hdr{padding:8px 12px;border-bottom:1px solid var(--br);background:var(--bg1);flex-shrink:0}
.s-hdr-top{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:4px}
.s-hdr-meta{font-size:12px;color:var(--tx2);display:flex;gap:10px;flex-wrap:wrap;align-items:center}
/* ── Log area ─────────────────────────────────────────────────── */
.filter-row{display:flex;align-items:center;gap:8px;padding:6px 12px;border-bottom:1px solid var(--br);flex-shrink:0;background:var(--bg0)}
.log-area{flex:1;overflow-y:auto;padding:8px 12px;-webkit-overflow-scrolling:touch}
.log-entry{display:flex;gap:8px;padding:6px 8px;border-radius:var(--rm);margin-bottom:3px;border-left:2px solid var(--br2);align-items:flex-start;transition:background .15s}
.log-entry.sev-ok{border-left-color:var(--green);background:var(--greenBg)}
.log-entry.sev-warning{border-left-color:var(--orange);background:var(--orangeBg)}
.log-entry.sev-issue{border-left-color:var(--red);background:var(--redBg)}
.log-entry.sev-info{border-left-color:var(--br2)}
.log-dot{font-size:11px;margin-top:3px;flex-shrink:0;line-height:1}
.log-meta{display:flex;gap:5px;flex-wrap:wrap;align-items:center;margin-bottom:2px}
.log-ts{font-size:10px;color:var(--tx3);font-family:monospace;white-space:nowrap}
.log-sev{font-size:10px;font-weight:700;padding:1px 6px;border-radius:20px;font-family:monospace}
.log-tag{font-size:10px;padding:1px 6px;border-radius:20px;background:var(--blueBg);color:var(--blue);font-family:monospace}
.log-text{font-size:13px;color:var(--tx1);line-height:1.45;word-break:break-word}
.log-edited{font-size:10px;color:var(--tx3);font-style:italic}
.log-actions{display:flex;gap:2px;flex-shrink:0;opacity:0;transition:opacity .15s;align-self:flex-start;margin-top:2px}
.log-entry:hover .log-actions{opacity:1}
@media(max-width:640px){.log-actions{opacity:1}}
.log-act{background:none;border:none;color:var(--tx3);font-size:13px;padding:2px 5px;border-radius:4px;cursor:pointer}
.log-act:hover{background:var(--bg2);color:var(--tx1)}
/* ── Thumbnails ───────────────────────────────────────────────── */
.thumbs{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.thumb{width:64px;height:64px;border-radius:var(--rm);overflow:hidden;border:1px solid var(--br);cursor:pointer;flex-shrink:0;position:relative}
.thumb img{width:100%;height:100%;object-fit:cover}
.thumb-play{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.4);font-size:20px;pointer-events:none}
.thumb-up{position:absolute;bottom:2px;left:2px;width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;color:#fff}
.thumb-up.uploading{background:var(--blue);animation:spin .8s linear infinite}
.thumb-up.error{background:var(--red)}
.thumb-up.ok{background:var(--green)}
.thumb-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:var(--bg2);font-size:20px}
.thumb-del{position:absolute;top:2px;right:2px;width:16px;height:16px;border-radius:50%;background:rgba(0,0,0,.65);border:none;color:#fff;font-size:9px;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0}
/* ── Input bar ────────────────────────────────────────────────── */
.input-bar{border-top:1px solid var(--br);padding:8px 12px;background:var(--bg1);flex-shrink:0;display:flex;flex-direction:column;gap:6px}
.input-row{display:flex;gap:6px;align-items:flex-end}
.input-controls{display:flex;flex-direction:column;gap:5px;flex-shrink:0}
textarea,input[type=text],select{background:var(--bg2);border:1px solid var(--br2);border-radius:var(--rm);color:var(--tx1);font-family:inherit;font-size:13px;padding:7px 10px;outline:none;width:100%;-webkit-appearance:none;appearance:none;transition:border-color .15s}
textarea:focus,input[type=text]:focus,select:focus{border-color:var(--gold)}
textarea{resize:none;line-height:1.4}
.sel-sev{width:110px;font-size:12px;padding:6px 8px;cursor:pointer}
.inp-tag{font-size:12px;padding:6px 8px;width:110px}
.inp-notes{font-size:12px;padding:5px 9px;min-height:30px;resize:vertical}
/* ── Buttons ──────────────────────────────────────────────────── */
button{background:var(--bg2);border:1px solid var(--br2);border-radius:var(--rm);color:var(--tx1);font-size:13px;padding:7px 13px;cursor:pointer;font-family:inherit;transition:background .15s,opacity .15s;white-space:nowrap;-webkit-appearance:none;line-height:1.2}
button:hover{background:var(--br2)}
button:active{opacity:.8}
button:disabled{opacity:.4;cursor:not-allowed}
.btn-gold{background:var(--goldBg);border-color:var(--goldDim);color:var(--goldTx);font-weight:700}
.btn-gold:hover{background:var(--gold);color:#000}
.btn-sm{font-size:12px;padding:5px 10px}
.btn-xs{font-size:11px;padding:3px 8px}
.btn-g{background:transparent;border-color:transparent;color:var(--tx2);padding:6px 8px}
.btn-g:hover{background:var(--bg2)}
.btn-danger{background:var(--redBg);border-color:rgba(239,68,68,.4);color:var(--red)}
/* ── Status bar ───────────────────────────────────────────────── */
.status-bar{padding:5px 12px;border-top:1px solid var(--br);background:var(--bg1);font-size:11px;color:var(--tx3);display:flex;align-items:center;gap:12px;flex-wrap:wrap;flex-shrink:0;font-family:monospace}
.closed-bar{padding:8px 12px;border-top:1px solid var(--br);background:var(--redBg);font-size:12px;color:var(--tx2);display:flex;align-items:center;justify-content:center;gap:8px;flex-shrink:0}
.sync-bar{padding:5px 12px;background:var(--goldBg);border-bottom:1px solid rgba(245,158,11,.2);font-size:11px;color:var(--goldTx);display:flex;align-items:center;gap:6px;flex-shrink:0}
/* ── Export dropdown ──────────────────────────────────────────── */
.exp-wrap{position:relative;display:inline-block}
.exp-menu{display:none;position:absolute;right:0;top:calc(100% + 4px);background:var(--bg1);border:1px solid var(--br2);border-radius:var(--rm);min-width:130px;z-index:50;box-shadow:0 4px 16px rgba(0,0,0,.3);overflow:hidden}
.exp-menu button{display:block;width:100%;text-align:left;background:none;border:none;border-radius:0;padding:9px 14px;font-size:13px;color:var(--tx1);cursor:pointer;border-bottom:1px solid var(--br)}
.exp-menu button:last-child{border-bottom:none}
.exp-menu button:hover{background:var(--bg2)}
/* ── Modals ───────────────────────────────────────────────────── */
.modal-back{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:flex-end;justify-content:center;z-index:100}
@media(min-width:480px){.modal-back{align-items:center}}
.modal{background:var(--bg1);border:1px solid var(--br2);border-radius:12px 12px 0 0;padding:20px;width:100%;max-width:460px;max-height:92vh;overflow-y:auto;-webkit-overflow-scrolling:touch}
@media(min-width:480px){.modal{border-radius:12px}}
.modal-title{font-size:15px;font-weight:700;margin-bottom:16px;color:var(--gold)}
.field{margin-bottom:11px}
.field label{display:block;font-size:11px;color:var(--tx2);text-transform:uppercase;letter-spacing:.7px;margin-bottom:4px;font-weight:600}
.field select{width:100%;font-size:13px;padding:7px 10px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:18px}
/* ── Media viewer ─────────────────────────────────────────────── */
.media-modal{position:fixed;inset:0;background:rgba(0,0,0,.92);display:flex;align-items:center;justify-content:center;z-index:200;cursor:pointer}
.media-modal img{max-width:95vw;max-height:90vh;object-fit:contain;border-radius:var(--rm)}
.media-modal video{max-width:95vw;max-height:90vh;border-radius:var(--rm)}
.media-close{position:fixed;top:14px;right:14px;z-index:201;background:rgba(255,255,255,.15);border:none;color:#fff;border-radius:50%;width:36px;height:36px;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.media-name{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);color:#fff;font-size:12px;font-family:monospace;background:rgba(0,0,0,.6);padding:4px 12px;border-radius:20px;pointer-events:none;max-width:90vw;text-overflow:ellipsis;white-space:nowrap;overflow:hidden}
/* ── Install bar ──────────────────────────────────────────────── */
.install-bar{background:var(--goldBg);border-bottom:1px solid rgba(245,158,11,.3);padding:7px 12px;display:flex;align-items:center;gap:8px;font-size:12px;flex-shrink:0;color:var(--goldTx)}
.install-bar span{flex:1}
/* ── Empty states ─────────────────────────────────────────────── */
.empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:40px;text-align:center;color:var(--tx2)}
.empty-icon{font-size:44px;opacity:.3}
/* ── Google sign-in button ────────────────────────────────────── */
.btn-google{background:#fff;border:1px solid #dadce0;color:#3c4043;font-weight:600;display:inline-flex;align-items:center;gap:8px;padding:10px 20px;font-size:14px;border-radius:var(--rm);cursor:pointer;transition:background .15s;white-space:nowrap}
.btn-google:hover{background:#f8f9fa}
/* ── Drive folder indicator ───────────────────────────────────── */
.folder-indicator{font-size:11px;color:var(--tx3);display:flex;align-items:center;gap:4px}
.folder-indicator.linked{color:var(--green)}
/* ── File names list (edit modal) ─────────────────────────────── */
.fnames{display:flex;flex-direction:column;gap:5px;margin-top:6px}
.fname-row{display:flex;align-items:center;gap:6px;font-size:12px}
.fname-row .fi{flex-shrink:0;color:var(--tx3);font-size:14px}
.fname-row input{flex:1;font-size:12px;padding:4px 8px}
.fname-status{font-size:11px;width:14px;text-align:center;flex-shrink:0}
/* ── Misc ─────────────────────────────────────────────────────── */
.no-entries{font-family:monospace;font-size:12px;color:var(--tx3);padding:24px 0;text-align:center}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{display:inline-block;width:12px;height:12px;border:2px solid rgba(245,158,11,.3);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--br2);border-radius:2px}
</style>
</head>
<body>
<div id="app">

  <!-- Install banner -->
  <div id="installBar" class="install-bar" style="display:none">
    <span>&#128242; Install the app for quick offline access</span>
    <button class="btn-gold btn-sm" id="btnInst">Install</button>
    <button class="btn-g btn-sm" id="btnInstX">&#10005;</button>
  </div>

  <!-- Sync progress bar -->
  <div id="syncBar" class="sync-bar" style="display:none">
    <span class="spinner"></span>
    <span id="syncMsg">Syncing...</span>
  </div>

  <!-- Top bar -->
  <div class="topbar">
    <button class="btn-g" id="btnSide" style="font-size:20px;padding:4px 8px">&#9776;</button>
    <span class="logo">&#9881; Field Service Log</span>
    <span class="top-badge" id="topBadge" style="display:none"></span>
    <div style="display:flex;align-items:center;gap:4px;margin-left:auto;flex-shrink:0">
      <span id="syncStatus" style="font-size:11px;color:var(--tx3);font-family:monospace;white-space:nowrap;margin-right:2px"></span>
      <button class="btn-g btn-sm" id="btnTheme" title="Toggle theme" style="font-size:16px;padding:5px 7px">&#9788;</button>
      <button class="btn-g btn-sm" id="btnImport" title="Import JSON">&#8679; Import</button>
      <input type="file" id="importFile" accept=".json" style="display:none">
      <button class="btn-gold btn-sm" id="btnNew">+ New</button>
    </div>
  </div>

  <!-- Body -->
  <div class="body">

    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
      <div class="side-hdr">
        <span class="side-label" id="sideCount">Sessions</span>
        <button class="btn-g btn-sm" id="btnSideX" style="font-size:14px">&#10005;</button>
      </div>
      <div class="s-list" id="sList"></div>
    </div>
    <div class="overlay" id="overlay"></div>

    <!-- Main content -->
    <div class="content" id="content">
      <!-- filled by JS -->
    </div>

  </div><!-- /body -->

  <!-- ── New session modal ────────────────────────────────── -->
  <div class="modal-back" id="newBack" style="display:none">
    <div class="modal">

// ╔══════════════════════════════════════════════════════════════╗
// ║  EXIF / MP4 TIMESTAMP                                        ║
// ╚══════════════════════════════════════════════════════════════╝
function readExifDate(buf){
  try{
    var v=new DataView(buf);
    if(v.getUint16(0,false)!==0xFFD8)return null;
    var off=2,len=v.byteLength;
    while(off<len){
      var mk=v.getUint16(off,false);
      if(mk===0xFFE1){
        var xs=off+4;
        if(v.getUint32(xs,false)!==0x45786966)return null;
        var to=xs+6,li=v.getUint16(to,false)===0x4949;
        var fi=v.getUint32(to+4,li);
        var ds=findTag(v,to,to+fi,li,0x9003)||findTag(v,to,to+fi,li,0x0132);
        return ds?parseExif(ds):null;
      }
      if((mk&0xFF00)!==0xFF00)break;
      off+=2+v.getUint16(off+2,false);
    }
  }catch(e){}return null;
}
function findTag(v,to,ifd,li,id){
  try{var n=v.getUint16(ifd,li);for(var i=0;i<n;i++){var e2=ifd+2+(i*12);if(v.getUint16(e2,li)===id){var c=v.getUint32(e2+4,li),vo=to+v.getUint32(e2+8,li),b=[];for(var j=0;j<c-1;j++)b.push(v.getUint8(vo+j));return String.fromCharCode.apply(null,b);}}}catch(e){}return null;
}
function parseExif(s){var m=/^(\d{4}):(\d{2}):(\d{2}) (\d{2}):(\d{2}):(\d{2})/.exec(s);if(!m)return null;var d=new Date(+m[1],+m[2]-1,+m[3],+m[4],+m[5],+m[6]);return isNaN(d.getTime())?null:d.toISOString();}
var MP4_OFF=2082844800;
function readMp4Date(buf){
  try{
    var v=new DataView(buf),off=0,len=v.byteLength;
    while(off<len-8){
      var sz=v.getUint32(off,false);
      var tp=String.fromCharCode(v.getUint8(off+4),v.getUint8(off+5),v.getUint8(off+6),v.getUint8(off+7));
      if(!sz||sz===1)break;
      if(tp==='moov'){
        var mo=off+8,me=off+sz,o2=mo;
        while(o2<me-8){var s2=v.getUint32(o2,false),t2=String.fromCharCode(v.getUint8(o2+4),v.getUint8(o2+5),v.getUint8(o2+6),v.getUint8(o2+7));if(!s2)break;if(t2==='mvhd'){var vr=v.getUint8(o2+8),sc=vr===1?(v.getUint32(o2+12,false)*4294967296+v.getUint32(o2+16,false)):v.getUint32(o2+12,false);if(!sc)return null;var d2=new Date((sc-MP4_OFF)*1000);if(isNaN(d2.getTime()))return null;var y=d2.getUTCFullYear();if(y<1990||y>2100)return null;return d2.toISOString();}o2+=s2;}
      }
      off+=sz;
    }
  }catch(e){}return null;
}
function getFileTs(file){
  var inner=new Promise(function(res){
    var fb=function(){res(file.lastModified?new Date(file.lastModified).toISOString():null);};
    var isJpg=file.type==='image/jpeg'||file.type==='image/jpg';
    var isVid=file.type.startsWith('video')||/\.(mp4|mov|m4v)$/i.test(file.name||'');
    if(isJpg){var r=new FileReader();r.onload=function(e){res(readExifDate(e.target.result)||(file.lastModified?new Date(file.lastModified).toISOString():null));};r.onerror=fb;r.readAsArrayBuffer(file);}
    else if(isVid){
      var trySlice=function(blob,last){var r2=new FileReader();r2.onload=function(e){var d=readMp4Date(e.target.result);if(d){res(d);return;}if(!last&&file.size>2*1024*1024)trySlice(file.slice(Math.max(0,file.size-2*1024*1024)),true);else fb();};r2.onerror=fb;r2.readAsArrayBuffer(blob);};
      trySlice(file.slice(0,Math.min(file.size,2*1024*1024)),file.size<=2*1024*1024);
    } else fb();
  });
  return Promise.race([inner,new Promise(function(r){setTimeout(function(){r(file.lastModified?new Date(file.lastModified).toISOString():null);},2500);})]);
}
function genVideoThumb(file){
  return new Promise(function(res){
    try{
      var url=URL.createObjectURL(file),v=document.createElement('video');
      v.preload='metadata';v.muted=true;v.playsInline=true;v.src=url;
      var done=false,finish=function(d){if(done)return;done=true;URL.revokeObjectURL(url);res(d);};
      v.addEventListener('loadeddata',function(){try{v.currentTime=Math.min(0.5,(v.duration||1)/4);}catch(e){capFr();}});
      v.addEventListener('seeked',capFr);
      v.addEventListener('error',function(){finish(null);});
      function capFr(){try{var c=document.createElement('canvas'),w=v.videoWidth||320,h=v.videoHeight||240,sc=Math.min(1,480/Math.max(w,h));c.width=Math.round(w*sc);c.height=Math.round(h*sc);c.getContext('2d').drawImage(v,0,0,c.width,c.height);finish(c.toDataURL('image/jpeg',0.7));}catch(e){finish(null);}}
      setTimeout(function(){finish(null);},4000);
    }catch(e){res(null);}
  });
}

async function googleLogin(){
  await loadGIS();
  if(!window.google||!window.google.accounts){alert('Cannot load Google Sign-In. Check your internet connection.');return;}
  return new Promise(function(res){
    var c=google.accounts.oauth2.initTokenClient({client_id:CLIENT_ID,scope:'https://www.googleapis.com/auth/drive.file',callback:function(r){if(r.error){res(null);return;}accessToken=r.access_token;tokenExpiry=Date.now()+(((r.expires_in||3600)-120)*1000);saveTok();res(accessToken);}});
    c.requestAccessToken({prompt:'consent'});
  });

async function getToken(){if(accessToken&&Date.now()<tokenExpiry)return accessToken;clearTok();isLoggedIn=false;return null;}

// ╔══════════════════════════════════════════════════════════════╗
// ║  DRIVE FOLDER UTILS                                          ║
// ╚══════════════════════════════════════════════════════════════╝
async function driveFind(token,name,parentId,mime){
  var q=["name="+JSON.stringify(name),"trashed=false","mimeType="+JSON.stringify(mime)];
  if(parentId)q.push(JSON.stringify(parentId)+" in parents");
  var r=await fetch('https://www.googleapis.com/drive/v3/files?q='+encodeURIComponent(q.join(' and '))+'&fields=files(id,name)',{headers:{Authorization:'Bearer '+token}});
  if(!r.ok)return null;
  var d=await r.json();
  return(d.files&&d.files.length)?d.files[0].id:null;
}
async function driveCreateFolder(token,name,parentId){
  var meta={name:name,mimeType:'application/vnd.google-apps.folder'};
  if(parentId)meta.parents=[parentId];
  var r=await fetch('https://www.googleapis.com/drive/v3/files',{method:'POST',headers:{Authorization:'Bearer '+token,'Content-Type':'application/json'},body:JSON.stringify(meta)});
  if(!r.ok)return null;
  return(await r.json()).id;
}
async function driveFolder(token,name,parentId){var id=await driveFind(token,name,parentId,'application/vnd.google-apps.folder');return id||(await driveCreateFolder(token,name,parentId));}
async function getRootId(token){
  if(cachedRootId)return cachedRootId;
  try{var s=localStorage.getItem(ROOT_KEY);if(s){cachedRootId=s;return s;}}catch(e){}
  var id=await driveFolder(token,ROOT_FOLDER,null);
  if(id){cachedRootId=id;try{localStorage.setItem(ROOT_KEY,id);}catch(e){}}
  return id;
}
async function getSessionFolder(token,s,kind){
  var rootId=await getRootId(token);if(!rootId)return null;
  var outId=await driveFolder(token,OUT_FOLDER,rootId);if(!outId)return null;
  var name=sanitize(s.client)+'_'+sanitize(s.machine)+'_'+sanitize(s.tech||'tech');
  var sessId=await driveFolder(token,name,outId);if(!sessId)return null;
  return await driveFolder(token,kind,sessId);
}
async function driveUploadJSON(token,name,jsonStr,parentId){
  var meta={name:name,mimeType:'application/json'};
  if(parentId)meta.parents=[parentId];
  var boundary='fsl_b_'+Date.now();
  var body='--'+boundary+'\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n'+JSON.stringify(meta)+'\r\n--'+boundary+'\r\nContent-Type: application/json\r\n\r\n'+jsonStr+'\r\n--'+boundary+'--';
  var r=await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id,name',{method:'POST',headers:{Authorization:'Bearer '+token,'Content-Type':'multipart/related; boundary='+boundary},body:body});
  return r.ok?(await r.json()).id:null;
}
async function driveUploadMedia(session,file,kind){
  var token=await ensureToken();if(!token)return null;
  var folderId=await getSessionFolder(token,session,kind);if(!folderId)return null;
  var meta={name:file.name||('file_'+Date.now()),parents:[folderId]};
  var boundary='fsl_m_'+Date.now();
  var enc=new TextEncoder();
  var p1=enc.encode('--'+boundary+'\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n'+JSON.stringify(meta)+'\r\n');
  var p2=enc.encode('--'+boundary+'\r\nContent-Type:'+(file.type||'application/octet-stream')+'\r\n\r\n');
  var p3=enc.encode('\r\n--'+boundary+'--');
  var fb=await file.arrayBuffer();
  var body=new Uint8Array(p1.length+p2.length+fb.byteLength+p3.length);
  var off=0;body.set(p1,off);off+=p1.length;body.set(p2,off);off+=p2.length;body.set(new Uint8Array(fb),off);off+=fb.byteLength;body.set(p3,off);
  var r=await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id,name',{method:'POST',headers:{Authorization:'Bearer '+token,'Content-Type':'multipart/related; boundary='+boundary},body:body});
  if(!r.ok)return null;
  var cr=await r.json();return{driveId:cr.id,name:cr.name};
}
function getDriveUrl(driveId){if(!accessToken||!driveId)return null;return 'https://www.googleapis.com/drive/v3/files/'+driveId+'?alt=media&access_token='+encodeURIComponent(accessToken);}
async function driveRename(driveId,newName){var token=await ensureToken();if(!token||!driveId)return false;try{var r=await fetch('https://www.googleapis.com/drive/v3/files/'+driveId,{method:'PATCH',headers:{Authorization:'Bearer '+token,'Content-Type':'application/json'},body:JSON.stringify({name:newName})});return r.ok;}catch(e){return false;}}

// ╔══════════════════════════════════════════════════════════════╗
// ║  DRIVE DATA SYNC                                             ║
// ╚══════════════════════════════════════════════════════════════╝
async function findDataFile(token){
  var rootId=await getRootId(token);
  var q="name='"+DATA_FILE+"' and trashed=false and mimeType='application/json'"+(rootId?" and '"+rootId+"' in parents":'');
  var r=await fetch('https://www.googleapis.com/drive/v3/files?q='+encodeURIComponent(q)+'&fields=files(id)',{headers:{Authorization:'Bearer '+token}});
  if(!r.ok)return null;
  var d=await r.json();
  if(d.files&&d.files.length)return d.files[0].id;
  // fallback: global search (old location)
  var q2="name='"+DATA_FILE+"' and trashed=false and mimeType='application/json'";
  var r2=await fetch('https://www.googleapis.com/drive/v3/files?q='+encodeURIComponent(q2)+'&fields=files(id)',{headers:{Authorization:'Bearer '+token}});
  if(!r2.ok)return null;
  var d2=await r2.json();
  return(d2.files&&d2.files.length)?d2.files[0].id:null;
}
async function loadFromDrive(){
  var token=await ensureToken();if(!token){setSyncStatus('error','Not authenticated');return;}
  setSyncStatus('loading','Loading from Google Drive...');
  try{
    if(!gdriveFileId)gdriveFileId=await findDataFile(token);
    saveTok();
    if(!gdriveFileId){setSyncStatus('ok','Google Drive connected ✓');return;}
    var r=await fetch('https://www.googleapis.com/drive/v3/files/'+gdriveFileId+'?alt=media',{headers:{Authorization:'Bearer '+token}});
    if(r.ok){
      var data=await r.json();
      if(Array.isArray(data)){
        var remIds=new Set(data.map(function(s){return s.id;}));
        var locOnly=sessions.filter(function(s){return !remIds.has(s.id);});
        sessions=data.concat(locOnly);saveLocal();
      }
      setSyncStatus('ok','Synced ✓');
    } else if(r.status===404){gdriveFileId=null;saveTok();setSyncStatus('ok','Google Drive connected ✓');}
    else setSyncStatus('error','Drive read error');
  }catch(e){setSyncStatus('error','Offline (local data)');}
}
async function saveToDrive(){
  var token=await ensureToken();if(!token){saveLocal();return;}
  setSyncStatus('loading','Saving to Google Drive...');
  try{
    var body=JSON.stringify(sessions),r;
    if(gdriveFileId){
      r=await fetch('https://www.googleapis.com/upload/drive/v3/files/'+gdriveFileId+'?uploadType=media',{method:'PATCH',headers:{Authorization:'Bearer '+token,'Content-Type':'application/json'},body:body});
    } else {
      var rootId=await getRootId(token);
      var meta=JSON.stringify({name:DATA_FILE,mimeType:'application/json',parents:rootId?[rootId]:[]});
      var bnd='fsl_d_'+Date.now();
      var mp='--'+bnd+'\r\nContent-Type: application/json\r\n\r\n'+meta+'\r\n--'+bnd+'\r\nContent-Type: application/json\r\n\r\n'+body+'\r\n--'+bnd+'--';
      r=await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart',{method:'POST',headers:{Authorization:'Bearer '+token,'Content-Type':'multipart/related; boundary='+bnd},body:mp});
      if(r.ok){gdriveFileId=(await r.json()).id;saveTok();}
    }
    if(r&&r.ok){isDirty=false;saveLocal();setSyncStatus('ok','Saved to Drive ✓ '+fts(now()).slice(12));}
    else{saveLocal();setSyncStatus('error','Drive save error');}
  }catch(e){saveLocal();setSyncStatus('error','Offline (saved locally)');}
}
function scheduleSave(){isDirty=true;saveLocal();if(syncTimer)clearTimeout(syncTimer);syncTimer=setTimeout(function(){if(isDirty&&isLoggedIn)saveToDrive();},2000);}
function scheduleSync(){setInterval(function(){if(isLoggedIn&&!isDirty&&!hasUnsaved())loadFromDrive().then(renderAll);},30000);}
function hasUnsaved(){var e=el('entIn');if(e&&e.value.trim())return true;if(pImgs.length)return true;if(editingId)return true;return false;}
function setSyncStatus(state,msg){
  var bar=el('syncBar'),st=el('syncStatus');
  if(state==='loading'){bar.style.display='flex';el('syncMsg').textContent=msg;st.innerHTML='<span class="spinner"></span>';}
  else if(state==='ok'){bar.style.display='none';st.innerHTML='<span style="color:var(--green)">● Drive</span>';}
  else if(state==='error'){bar.style.display='none';st.innerHTML='<span style="color:var(--red)" title="'+esc(msg)+'">● Local</span>';}
  else{bar.style.display='none';st.innerHTML='';}
}

// ║  THUMBNAILS                                                  ║
// ╚══════════════════════════════════════════════════════════════╝
function thumbHTML(img,i,isDel){
  var isVid=img.type==='video',src=isVid?(img.poster||''):img.data;
  var upBadge='';
  if(isVid){if(img.uploadStatus==='uploading')upBadge='<div class="thumb-up uploading">⟳</div>';else if(img.uploadStatus==='error')upBadge='<div class="thumb-up error">!</div>';else if(img.uploadStatus==='done')upBadge='<div class="thumb-up ok">✓</div>';}
  return '<div class="thumb" data-i="'+i+'">'
    +(src?'<img src="'+src+'" alt="Attachment">':'<div class="thumb-ph">'+(isVid?'🎬':'🖼')+'</div>')
    +(isVid?'<div class="thumb-play">▶</div>':'')
    +upBadge
    +(isDel?'<button class="thumb-del" data-i="'+i+'">✕</button>':'')
    +'</div>';
}
function rThumbs(){
  var c=el('pThumbs');if(!c)return;c.innerHTML='';
  pImgs.forEach(function(img,i){
    var d=document.createElement('div');d.innerHTML=thumbHTML(img,i,true);
    d=d.firstChild;
    d.querySelector('.thumb-del').addEventListener('click',function(){pImgs=pImgs.filter(function(_,j){return j!==i;});rThumbs();});
    c.appendChild(d);
  });
}
function rEThumbs(){
  var c=el('eThumbs');if(!c)return;c.innerHTML='';
  eImgs.forEach(function(img,i){
    var d=document.createElement('div');d.innerHTML=thumbHTML(img,i,true);
    d=d.firstChild;
    d.querySelector('.thumb-del').addEventListener('click',function(){eImgs=eImgs.filter(function(_,j){return j!==i;});rEThumbs();renderEFileNames();});
    c.appendChild(d);
  });
  renderEFileNames();
}
function renderEFileNames(){
  var list=el('eFileNames');if(!list)return;list.innerHTML='';
  eImgs.forEach(function(img,i){
    var row=document.createElement('div');row.className='fname-row';
    row.innerHTML='<span class="fi">'+(img.type==='video'?'🎬':'📷')+'</span><input type="text" value="'+esc(img.name||'')+'" data-i="'+i+'"><span class="fname-status" data-i="'+i+'"></span>';
    var inp=row.querySelector('input'),st=row.querySelector('.fname-status');
    inp.addEventListener('change',function(){
      var n=inp.value.trim();if(!n||n===img.name)return;
      var old=img.name;img.name=n;
      if(img.driveId){st.textContent='⟳';driveRename(img.driveId,n).then(function(ok){st.textContent=ok?'✓':'✗';if(!ok){img.name=old;inp.value=old;}scheduleSave();});}
      else scheduleSave();
    });
    list.appendChild(row);
  });
}

// ║  FILE INPUT HANDLER                                          ║
// ╚══════════════════════════════════════════════════════════════╝
function handleFileInput(e,isEdit){
  var active=sessions.find(function(s){return s.id===aid;});
  Array.from(e.target.files||[]).forEach(function(file){
    var isVid=file.type.startsWith('video')||/\.(mp4|mov|m4v)$/i.test(file.name||'');
    if(isVid){
      var img={data:null,type:'video',name:file.name,uploadStatus:'uploading',poster:null};
      if(isEdit){eImgs.push(img);rEThumbs();}else{pImgs.push(img);rThumbs();}
      var inc=function(){if(isEdit)pExifEdit++;else pExif++;};
      var dec=function(){if(isEdit)pExifEdit--;else pExif--;};
      inc();getFileTs(file).then(function(ts){img.capturedAt=ts;dec();if(isEdit)rEThumbs();else rThumbs();});
      inc();genVideoThumb(file).then(function(t){if(t)img.poster=t;dec();if(isEdit)rEThumbs();else rThumbs();});
      if(active&&isLoggedIn){
        inc();driveUploadMedia(active,file,'videos').then(function(r){
          if(r){img.driveId=r.driveId;img.name=r.name;img.uploadStatus='done';}else img.uploadStatus='error';
          dec();if(isEdit)rEThumbs();else rThumbs();scheduleSave();
        });
      } else img.uploadStatus=isLoggedIn?'no-folder':'no-drive';
    } else {
      var r2=new FileReader();
      r2.onload=function(ev){
        var img2={data:ev.target.result,type:'image',name:file.name};
        if(isEdit){eImgs.push(img2);rEThumbs();}else{pImgs.push(img2);rThumbs();}
        var inc2=function(){if(isEdit)pExifEdit++;else pExif++;};
        var dec2=function(){if(isEdit)pExifEdit--;else pExif--;};
        inc2();getFileTs(file).then(function(ts){img2.capturedAt=ts;dec2();if(isEdit)rEThumbs();else rThumbs();});
        if(active&&isLoggedIn){driveUploadMedia(active,file,'photos').then(function(r3){if(r3){img2.driveId=r3.driveId;img2.name=r3.name;}scheduleSave();});}
      };r2.readAsDataURL(file);
    }
  });
  e.target.value='';
}

function earliestTs(imgs){var d=(imgs||[]).map(function(i){return i.capturedAt;}).filter(Boolean).sort();return d.length?d[0]:null;}
function addEntry(){
  var entIn=el('entIn');if(!entIn)return;
  var text=entIn.value.trim();if(!text && !pImgs.length)return;

el('btnImport').addEventListener('click',function(){el('importFile').click();});
el('importFile').addEventListener('change',function(e){
  var file=e.target.files&&e.target.files[0];if(!file)return;
  var r=new FileReader();
  r.onload=function(ev){
    try{
      var data=JSON.parse(ev.target.result);
      if(!Array.isArray(data))throw new Error('Expected a JSON array');
      var existIds=new Set(sessions.map(function(s){return s.id;}));
      var added=data.filter(function(s){return s.id&&!existIds.has(s.id);});
      var skipped=data.length-added.length;
      sessions=added.concat(sessions);
      saveLocal();
      // If logged in, also sync folder structure to Drive for imported sessions
      if(isLoggedIn&&added.length){
        ensureToken().then(function(token){
          if(!token)return;
          added.forEach(function(s){
            // Create folder structure if needed (fire and forget)
            getSessionFolder(token,s,'photos').catch(function(){});
            getSessionFolder(token,s,'videos').catch(function(){});
          });
        });
      }
      renderAll();
      var msg='Imported '+added.length+' session(s).';
      if(skipped)msg+=' '+skipped+' skipped (already exist).';
      if(isLoggedIn)msg+=' Drive folders will be created automatically.';
      alert(msg);
    }catch(err){alert('Import failed: '+err.message);}
    e.target.value='';
  };
  r.onerror=function(){alert('Could not read file.');};
  r.readAsText(file);
});

    new D.Table({width:{size:9226,type:D.WidthType.DXA},columnWidths:[1700,900,900,4626,1100],rows:[new D.TableRow({tableHeader:true,children:[hdrCell('Timestamp'),hdrCell('Severity'),hdrCell('Tag'),hdrCell('Description'),hdrCell('Attachments')]})].concat(rows)}),
    new D.Paragraph({spacing:{after:200},children:[new D.TextRun({text:''})]}),
  ].concat(s.notes?[new D.Paragraph({spacing:{after:80},children:[new D.TextRun({text:'General notes:',bold:true,size:20,font:'Arial'})]}),new D.Paragraph({spacing:{after:400},children:[new D.TextRun({text:s.notes,size:20,font:'Arial'})]})]:[]
  ).concat([
    new D.Paragraph({spacing:{before:800,after:40},border:{top:{style:D.BorderStyle.SINGLE,size:2,color:'E5E7EB',space:1}},children:[new D.TextRun({text:'Technician signature: '+(s.tech||'_________________'),size:20,font:'Arial'})]}),
    new D.Paragraph({spacing:{before:600,after:40},border:{top:{style:D.BorderStyle.SINGLE,size:2,color:'E5E7EB',space:1}},children:[new D.TextRun({text:'Client / Recipient signature: _________________',size:20,font:'Arial'})]}),
    new D.Paragraph({spacing:{before:200},children:[new D.TextRun({text:'ID: '+s.id,size:16,font:'Arial',color:'9CA3AF'})]}),
  ])}]});
  D.Packer.toBlob(doc).then(function(blob){dlBlob(blob,'report_'+base+'.docx');}).catch(function(err){alert('DOCX error: '+err.message);});
}

document.addEventListener('click',function(){
  ['expMenu','expMenuC'].forEach(function(id){var m=el(id);if(m)m.style.display='none';});

function renderAll(){renderSidebar();renderContent();}

// ╔══════════════════════════════════════════════════════════════╗

sessions=loadLocal();
if(loadTok()&&accessToken&&Date.now()<tokenExpiry){
  isLoggedIn=true;
  loadFromDrive().then(function(){renderAll();scheduleSync();});
} else {
  renderAll();
}

})();
